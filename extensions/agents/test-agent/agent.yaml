name: Test Agent
description: Test agent with the full workspace tool set, for validating behaviors
model:
  provider: aws-bedrock-claude-invoke
  id: global.anthropic.claude-sonnet-4-6
  endpoint: https://bedrock-runtime.ap-northeast-1.amazonaws.com
  promptCaching: true
  thinking:
    enabled: true
    effort: medium
context:
  maxTokens: 200000
  compressAt: 0.7
tools:
  - start_session
  - query_session
  - session_list
  - list_agents
  - get_session_output
  - file_read
  - file_write
  - file_edit
  - file_list
  - shell_exec
  - grep
  - glob
  - web_fetch
skills: []
