<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Halo</title>
  <style>
    /* Match admin UI dark theme — see packages/admin/src/app/globals.css. */
    * { box-sizing: border-box; }
    html { color-scheme: dark; }
    body {
      margin: 0;
      font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #ededed;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      -webkit-user-select: none;
      user-select: none;
    }
    .logo { animation: float 2.4s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .title { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
    .status { color: #a1a1aa; font-size: 13px; min-height: 18px; }
    .bar {
      width: 180px; height: 3px; border-radius: 3px;
      background: #1f1f23; overflow: hidden; position: relative;
    }
    .bar::after {
      content: ''; position: absolute; left: -40%; top: 0; height: 100%; width: 40%;
      background: linear-gradient(90deg, transparent, #6087fa, transparent);
      animation: slide 1.1s ease-in-out infinite;
    }
    @keyframes slide { 0% { left: -40%; } 100% { left: 100%; } }
  </style>
</head>
<body>
  <div class="logo">
    <svg width="56" height="56" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#a78bfa"/>
      </linearGradient></defs>
      <path d="M16 2 L28.66 9 L28.66 23 L16 30 L3.34 23 L3.34 9 Z" fill="url(#g)"/>
      <text x="16" y="22.5" font-family="-apple-system,sans-serif" font-size="17" font-weight="800" fill="white" text-anchor="middle">B</text>
    </svg>
  </div>
  <div class="title">Halo</div>
  <div class="bar"></div>
  <div class="status" id="status">Starting up…</div>
  <script>
    // First launch on macOS can take a while: Gatekeeper scans the whole
    // (unsigned) app bundle before our code even runs, then the server boots.
    // Rotate a few reassuring messages so it doesn't look frozen.
    const msgs = [
      'Starting up…',
      'First launch may take a little longer…',
      'Verifying app (macOS security scan)…',
      'Initializing workspace…',
      'Almost ready…',
    ]
    let i = 0
    const el = document.getElementById('status')
    setInterval(() => { i = (i + 1) % msgs.length; el.textContent = msgs[i] }, 2600)
  </script>
</body>
</html>
