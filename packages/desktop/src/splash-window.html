<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Halo</title>
  <style>
    /* Match admin UI dark theme — see packages/admin/src/app/globals.css. */
    * { box-sizing: border-box; }
    html { color-scheme: dark; }
    body {
      margin: 0;
      font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #ededed;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      -webkit-user-select: none;
      user-select: none;
    }
    .logo { animation: float 2.4s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .title { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
    .status { color: #a1a1aa; font-size: 13px; min-height: 18px; }
    .bar {
      width: 180px; height: 3px; border-radius: 3px;
      background: #1f1f23; overflow: hidden; position: relative;
    }
    .bar::after {
      content: ''; position: absolute; left: -40%; top: 0; height: 100%; width: 40%;
      background: linear-gradient(90deg, transparent, #6087fa, transparent);
      animation: slide 1.1s ease-in-out infinite;
    }
    @keyframes slide { 0% { left: -40%; } 100% { left: 100%; } }
  </style>
</head>
<body>
  <div class="logo">
    <svg width="56" height="56" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="core_sp" cx="42%" cy="38%" r="68%"><stop offset="0" stop-color="#d8e6ff"/><stop offset="0.35" stop-color="#8aa6ff"/><stop offset="1" stop-color="#9b6bff"/></radialGradient>
        <linearGradient id="ring_sp" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6f9bff"/><stop offset="1" stop-color="#a06bff"/></linearGradient>
        <linearGradient id="bg_sp" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0e1430"/><stop offset="1" stop-color="#070a16"/></linearGradient>
        <clipPath id="sq_sp"><rect x="104" y="104" width="816" height="816" rx="182"/></clipPath>
      </defs>
      <g clip-path="url(#sq_sp)">
        <rect x="104" y="104" width="816" height="816" fill="url(#bg_sp)"/>
        <circle cx="512" cy="512" r="118" fill="none" stroke="url(#ring_sp)" stroke-width="15" opacity="0.34"/>
        <circle cx="512" cy="512" r="176" fill="none" stroke="url(#ring_sp)" stroke-width="12" opacity="0.20"/>
        <circle cx="512" cy="512" r="62" fill="url(#core_sp)"/>
      </g>
    </svg>
  </div>
  <div class="title">Halo</div>
  <div class="bar"></div>
  <div class="status" id="status">Starting up…</div>
  <script>
    // First launch on macOS can take a while: Gatekeeper scans the whole
    // (unsigned) app bundle before our code even runs, then the server boots.
    // Rotate a few reassuring messages so it doesn't look frozen.
    const msgs = [
      'Starting up…',
      'First launch may take a little longer…',
      'Verifying app (macOS security scan)…',
      'Initializing workspace…',
      'Almost ready…',
    ]
    let i = 0
    const el = document.getElementById('status')
    setInterval(() => { i = (i + 1) % msgs.length; el.textContent = msgs[i] }, 2600)
  </script>
</body>
</html>
