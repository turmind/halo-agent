id: aws-bedrock-mantle
displayName: AWS Bedrock Mantle (OpenAI GPT-5.x)
displayName_zh: AWS Bedrock Mantle（OpenAI GPT-5.x）
description: OpenAI GPT-5.6 (Sol / Terra / Luna) on Amazon Bedrock via the bedrock-mantle endpoint (OpenAI Responses API only — not Converse/InvokeModel).
description_zh: 通过 Bedrock Mantle 端点调用 OpenAI GPT-5.6（Sol / Terra / Luna）（仅 OpenAI Responses API，不支持 Converse/InvokeModel）。
# Mantle is a distinct endpoint from bedrock-runtime; the OpenAI surface lives
# under /openai/v1. Regions: us-east-2 serves ALL models below; us-west-2
# additionally serves Terra / Luna but NOT Sol. We ship the us-east-2
# endpoint that covers everything.
defaultEndpoint: https://bedrock-mantle.us-east-2.api.aws/openai/v1
endpointPresets:
  - https://bedrock-mantle.us-east-2.api.aws/openai/v1

defaultModelId: openai.gpt-5.6-sol

# Auth: a Bedrock long-term API key passed as a Bearer token. Generate at
# console → Bedrock → API keys → long-term. The default placeholder reads the
# AWS_BEARER_TOKEN_BEDROCK env var; leave the env unset and fill the key in
# Settings to store it in secrets/settings.yaml instead. resolveApiKey() reads
# `api_key`, so the bearer token flows straight to the agent with no extra wiring.
secrets:
  - key: api_key
    description: Bedrock long-term API key (sent as a Bearer token). Defaults to the AWS_BEARER_TOKEN_BEDROCK env var.
    description_zh: Bedrock 长期 API Key（作为 Bearer 令牌发送）。默认读取 AWS_BEARER_TOKEN_BEDROCK 环境变量。
    default: <<AWS_BEARER_TOKEN_BEDROCK>>
    secret: true

# capability notes for Mantle/OpenAI:
#   - image: input only (text/image in, text-only out — no audio/video/image gen)
#   - promptCaching: AUTOMATIC (prefix ≥1024 tok, ~5min idle TTL). No cache_control
#     is sent and there's no 1h option — single 5m preset reflects reality, the
#     runtime never writes cache control, it only reads cached_tokens back.
#   - thinking: adaptive via reasoning.effort = low|medium|high (no budget_tokens
#     mode; xhigh/max are mapped down to high by the runtime since the
#     Responses API only accepts low/medium/high on the wire). Note: Mantle
#     never surfaces reasoning summaries — output[].reasoning.summary stays empty
#     even with reasoning.summary=detailed (verified against the live endpoint;
#     reasoning_tokens > 0 proves thinking runs). So no thinking text is shown in
#     the UI; that's upstream behavior, not a parsing gap.
#   - maxOutputTokens for the 5.6 variants: not disclosed in the 5.6 model card —
#     conservatively carried over from GPT-5.5's 64000.
models:
  # GPT-5.6 flagship.
  - id: openai.gpt-5.6-sol
    displayName: GPT-5.6 Sol
    maxOutputTokens: 64000
    contextWindow: 272000
    capabilities:
      image: true
      video: false
      audio: false
      promptCaching:
        default: 5m
        ttlPresets:
          - { value: 5m, label: 5min }
      thinking:
        mode: adaptive
        defaultEnabled: true
        default: medium
        effortPresets:
          - { value: low, label: Low }
          - { value: medium, label: Medium }
          - { value: high, label: High }
          - { value: xhigh, label: XHigh }
          - { value: max, label: Max }
      # Output length of the final answer (Responses API `text.verbosity`),
      # separate from reasoning effort. Default low = terse + cheaper, best for
      # tool-driven agent turns. Override per-agent via agent.yaml model.verbosity.
      verbosity:
        default: low
        presets:
          - { value: low, label: Low }
          - { value: medium, label: Medium }
          - { value: high, label: High }

  # GPT-5.6 balanced — official line: GPT-5.5-level performance at half the price.
  - id: openai.gpt-5.6-terra
    displayName: GPT-5.6 Terra
    maxOutputTokens: 64000
    contextWindow: 272000
    capabilities:
      image: true
      video: false
      audio: false
      promptCaching:
        default: 5m
        ttlPresets:
          - { value: 5m, label: 5min }
      thinking:
        mode: adaptive
        defaultEnabled: true
        default: medium
        effortPresets:
          - { value: low, label: Low }
          - { value: medium, label: Medium }
          - { value: high, label: High }
          - { value: xhigh, label: XHigh }
          - { value: max, label: Max }
      # See GPT-5.6 Sol above — final-answer length, default low, per-agent overridable.
      verbosity:
        default: low
        presets:
          - { value: low, label: Low }
          - { value: medium, label: Medium }
          - { value: high, label: High }

  # GPT-5.6 fast / low-cost.
  - id: openai.gpt-5.6-luna
    displayName: GPT-5.6 Luna
    maxOutputTokens: 64000
    contextWindow: 272000
    capabilities:
      image: true
      video: false
      audio: false
      promptCaching:
        default: 5m
        ttlPresets:
          - { value: 5m, label: 5min }
      thinking:
        mode: adaptive
        defaultEnabled: true
        default: medium
        effortPresets:
          - { value: low, label: Low }
          - { value: medium, label: Medium }
          - { value: high, label: High }
          - { value: xhigh, label: XHigh }
          - { value: max, label: Max }
      # See GPT-5.6 Sol above — final-answer length, default low, per-agent overridable.
      verbosity:
        default: low
        presets:
          - { value: low, label: Low }
          - { value: medium, label: Medium }
          - { value: high, label: High }
