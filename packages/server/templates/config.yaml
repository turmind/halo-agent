# Halo System Configuration
# Self-documenting: each leaf is { value, default, description, description_zh }.
#
# Env var overrides (highest priority):
#   server.port               → HALO_PORT
#   server.password           → HALO_PASSWORD
#   server.cors_origins       → HALO_CORS_ORIGINS  (comma-separated)
#   timeout.shell_exec        → HALO_SHELL_TIMEOUT
#   timeout.web_fetch         → HALO_WEB_FETCH_TIMEOUT
#   timeout.session_grace     → HALO_SESSION_GRACE
#   timeout.terminal_grace    → HALO_TERMINAL_GRACE
#   logging.max_file_size     → HALO_LOG_MAX_SIZE
#   logging.max_files         → HALO_LOG_MAX_FILES

server:
  port:
    value: 9527
    default: 9527
    description: "HTTP/WS port the server listens on."
    description_zh: "服务监听的 HTTP/WS 端口。"
  password:
    value: ""
    default: ""
    description: "Admin password — stored as a scrypt hash, set via `halo setup`. To reset a forgotten password, blank this field and re-run `halo setup`."
    description_zh: "管理员密码（scrypt hash），通过 `halo setup` 设置。忘记密码时清空此字段并重新运行 `halo setup`。"
  jwt_secret:
    value: ""
    default: ""
    description: "Signing key for session JWTs. Auto-generated by `halo setup`; rotated on password change so old cookies are invalidated."
    description_zh: "Session JWT 签名密钥。由 `halo setup` 自动生成，密码更改时一同轮换以使旧 cookie 失效。"
  cors_origins:
    value: []
    default: []
    description: "CORS allowlist. Empty = reflect any origin (recommended for self-hosted single-user setups). Set a non-empty list of explicit origins to enforce strict CORS."
    description_zh: "CORS 白名单。空 = 反射任意来源（自部署单用户场景推荐）。填入显式来源列表则启用严格 CORS。"

timeout:
  shell_exec:
    value: 120000
    default: 120000
    description: "shell_exec tool timeout (ms)."
    description_zh: "shell_exec 工具的超时（毫秒）。"
  web_fetch:
    value: 10000
    default: 10000
    description: "web_fetch tool timeout (ms)."
    description_zh: "web_fetch 工具的超时（毫秒)。"
  session_grace:
    value: 300000
    default: 300000
    description: "Idle session grace period before unloading from memory (ms)."
    description_zh: "空闲会话保留在内存中的时长（毫秒）。"
  terminal_grace:
    value: 300000
    default: 300000
    description: "Terminal grace period after disconnect before killing the pty (ms)."
    description_zh: "终端断连后保留 pty 的时长（毫秒）。"

logging:
  max_file_size:
    value: 10485760
    default: 10485760
    description: "Per-log-file size cap before rotation (bytes)."
    description_zh: "单个日志文件的大小上限（字节）。"
  max_files:
    value: 5
    default: 5
    description: "Number of rotated log files to keep."
    description_zh: "保留的日志文件数量。"
